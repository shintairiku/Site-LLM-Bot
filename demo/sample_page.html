<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>サンプルホームページ</title>
    <style>
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        color: #10212b;
        background:
          radial-gradient(circle at top right, rgba(21, 94, 117, 0.16), transparent 32%),
          linear-gradient(180deg, #f5f7f8, #ffffff 40%);
      }

      .hero {
        max-width: 1080px;
        margin: 0 auto;
        padding: 72px 24px 120px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #d8eef4;
        color: #155e75;
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(32px, 6vw, 64px);
        line-height: 1.08;
      }

      p {
        max-width: 720px;
        line-height: 1.8;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-top: 32px;
      }

      .card {
        padding: 20px;
        border: 1px solid #dce6ea;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        box-shadow: 0 16px 48px rgba(16, 33, 43, 0.06);
      }

      .dev-tenant-switcher {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 12px 16px;
        max-width: 720px;
        margin-top: 28px;
        padding: 16px;
        border: 1px solid #dce6ea;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
      }

      .dev-tenant-switcher label {
        display: block;
        margin-bottom: 6px;
        color: #43535c;
        font-size: 12px;
        font-weight: 700;
      }

      .dev-tenant-switcher select {
        min-width: 220px;
        border: 1px solid #cbd8dd;
        border-radius: 8px;
        padding: 10px 12px;
        color: #10212b;
        background: #fff;
        font: 700 14px/1.4 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .dev-tenant-domain {
        margin: 0;
        color: #43535c;
        font-size: 13px;
      }

      .dev-tenant-domain strong {
        color: #10212b;
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <span class="eyebrow">サンプルサイト</span>
      <h1>住まい相談の導線として<br />AIチャットボットを設置</h1>
      <p>
        このページは、住宅・リフォーム業向けAIチャットボットの設置イメージを確認するための
        サンプルホームページです。次工程でウィジェット埋め込みテストを行う前提で、
        ヒーロー領域と主要導線の見え方を先に整えています。
      </p>
      <section class="dev-tenant-switcher" aria-label="開発用テナント切り替え">
        <div>
          <label for="dev-tenant-select">Web検索対象</label>
          <select id="dev-tenant-select">
            <option
              value="sample-shintairiku"
              data-tenant-name="新大陸"
              data-domain="shintairiku.jp"
              data-public-token="public_sample_shintairiku"
            >
              新大陸
            </option>
            <option
              value="reform-tamao"
              data-tenant-name="リフォームのタマオ"
              data-domain="reform-tamao.com"
              data-public-token="public_reform_tamao"
            >
              リフォームのタマオ
            </option>
            <option
              value="more-living"
              data-tenant-name="MORE Living"
              data-domain="moreliving.co.jp"
              data-public-token="public_more_living"
            >
              MORE Living
            </option>
          </select>
        </div>
        <p class="dev-tenant-domain">
          allowed_domains: <strong id="dev-tenant-domain">shintairiku.jp</strong>
        </p>
      </section>
      <section class="cards">
        <article class="card">
          <h2>新築相談</h2>
          <p>家づくりの流れ、土地探し、資金計画の問い合わせ導線を想定しています。</p>
        </article>
        <article class="card">
          <h2>リフォーム相談</h2>
          <p>水回り、外装、断熱改修など、一次相談の受付導線を想定しています。</p>
        </article>
        <article class="card">
          <h2>施工エリア確認</h2>
          <p>よくある質問を短時間で解消できる構成を想定しています。</p>
        </article>
      </section>
    </main>
    <script
      id="site-llm-bot-widget"
      src="https://site-llm-bot-742231208085.asia-northeast1.run.app/static/widget.js"
      data-tenant-id="sample-shintairiku"
      data-tenant-name="新大陸"
      data-public-token="public_sample_shintairiku"
      data-api-base="https://site-llm-bot-742231208085.asia-northeast1.run.app"
      defer
    ></script>
    <script>
      (function () {
        const select = document.getElementById("dev-tenant-select");
        const domain = document.getElementById("dev-tenant-domain");
        const widgetScript = document.getElementById("site-llm-bot-widget");

        if (!select || !domain || !widgetScript) {
          return;
        }

        function syncTenant() {
          const option = select.selectedOptions[0];
          const detail = {
            tenantId: option.value,
            tenantName: option.dataset.tenantName,
            publicToken: option.dataset.publicToken,
          };

          widgetScript.dataset.tenantId = detail.tenantId;
          widgetScript.dataset.tenantName = detail.tenantName;
          widgetScript.dataset.publicToken = detail.publicToken;
          domain.textContent = option.dataset.domain;
          window.dispatchEvent(new CustomEvent("site-llm-bot:tenant-change", { detail }));
        }

        select.addEventListener("change", syncTenant);
      })();
    </script>
  </body>
</html>
